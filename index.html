<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Akıllı Kütüphane Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/firebase-config.js"></script>

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      color: #0f172a;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .card {
      background: rgba(255,255,255,.8);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 24px 70px rgba(37, 99, 235, .14);
    }

    h1, h2 { margin-top: 0; }

    #kapasite {
      font-size: 5rem;
      font-weight: 800;
      color: #2563eb;
      margin: 12px 0;
    }

    #status {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 800;
      font-size: .9rem;
    }

    canvas {
      width: 100% !important;
      height: 280px !important;
    }

    a {
      color: #2563eb;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div>
    <p><a href="landing.html">← Tanıtım sayfasına dön</a></p>
    <h1>Akıllı Kütüphane Dashboard</h1>

    <div class="container">
      <div class="card">
        <h2>CAPACITY</h2>
        <div id="kapasite">-</div>
        <div id="status">-</div>
      </div>

      <div class="card">
        <h2>Kapasite Grafiği</h2>
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <script>

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let labels = [];
    let dataPoints = [];
    let lastKapasite = null;

    const ctx = document.getElementById("chart").getContext("2d");
    const chart = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Kapasite",
          data: dataPoints,
          borderWidth: 3,
          borderColor: "#2563eb",
          backgroundColor: "rgba(37,99,235,.12)",
          fill: true,
          tension: .4
        }]
      },
      options: {
        animation: false,
        plugins: { legend: { display: false } },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { stepSize: 1 }
          }
        }
      }
    });

    db.ref("/").on("value", snapshot => {
      const data = snapshot.val();
      if (!data) return;

      document.getElementById("kapasite").innerText = data.kapasite ?? "-";
      document.getElementById("status").innerText = data.status ?? "-";

      if (data.kapasite !== lastKapasite) {
        labels.push(new Date().toLocaleTimeString());
        dataPoints.push(data.kapasite);
        lastKapasite = data.kapasite;

        if (labels.length > 10) {
          labels.shift();
          dataPoints.shift();
        }

        chart.update();
      }
    });
  </script>
</body>
</html>
